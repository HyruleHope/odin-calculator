<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="./index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div id="displayCase">
    </div>
    <div id="operands">
        <button class="classicButtons" onclick="Update('+')">+</button>
        <button class="classicButtons" onclick="Update('-')">-</button>
        <button class="classicButtons" onclick="Update('*')">*</button>
        <button class="classicButtons" onclick="Update('/')">/</button>
        <button class="equalButton" onclick="Operate(firstNumber, lastNumber, operand)">=</button>
    </div>
    <div id="numbers">
        <button class="classicButtons" onclick="Update('7')">7</button>
        <button class="classicButtons" onclick="Update('8')">8</button>
        <button class="classicButtons" onclick="Update('9')">9</button>
        <button class="classicButtons" onclick="Update('4')">4</button>
        <button class="classicButtons" onclick="Update('5')">5</button>
        <button class="classicButtons" onclick="Update('6')">6</button>
        <button class="classicButtons" onclick="Update('1')">1</button>
        <button class="classicButtons" onclick="Update('2')">2</button>
        <button class="classicButtons" onclick="Update('3')">3</button>
        <button class="classicButtons" onclick="Update('0')">0</button>
        <button class="classicButtons" onclick="Clear()">clear</button>
    </div>
</body>
</html>
